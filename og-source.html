<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #0e0e0e;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #e5e5e5;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px;
  }
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1100px; height: 1100px;
    background: radial-gradient(circle, rgba(34,197,94,0.10) 0%, rgba(34,197,94,0) 60%);
  }
  .border { position: absolute; inset: 0; border: 1px solid rgba(255,255,255,0.06); }
  .content { position: relative; z-index: 1; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500;
    color: #22c55e; background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.3); padding: 10px 22px; border-radius: 999px;
    margin-bottom: 40px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; }
  .logo { font-size: 40px; font-weight: 700; letter-spacing: -1px; margin-bottom: 24px; color: #fff; }
  .logo span { color: #22c55e; }
  h1 { font-size: 78px; font-weight: 700; line-height: 1.05; letter-spacing: -2px; color: #fff; }
  h1 .g { color: #22c55e; }
  p { font-size: 28px; color: #888; margin-top: 32px; max-width: 820px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="border"></div>
  <div class="content">
    <div class="eyebrow"><span class="dot"></span> Built exclusively for cannabis</div>
    <div class="logo">Bud<span>OS</span></div>
    <h1>Custom Software for<br /><span class="g">Dispensaries &amp; Growers.</span></h1>
    <p>No templates. No locked-in contracts. Built specifically for your business.</p>
  </div>
</body>
</html>
